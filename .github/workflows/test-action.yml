name: Test action

on:
  push:
    branches: [main]
    paths:
      - 'action.yml'
      - 'action/**'
      - '.github/workflows/test-action.yml'
      - 'src/**'
      - 'Cargo.toml'
  pull_request:
    paths:
      - 'action.yml'
      - 'action/**'
      - '.github/workflows/test-action.yml'
      - 'src/**'
      - 'Cargo.toml'

concurrency:
  group: test-action-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── build binary from source (shared by all dry-run jobs via cache) ────────
  # Dry-run tests need the current source binary, not the latest release, so
  # that features not yet in a release (--auto, --pre, --rule) can be tested.
  build:
    name: Build flopha from source
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build release binary
        run: cargo build --release
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: flopha-linux
          path: target/release/flopha
          retention-days: 1

  # ── basic dry-run ──────────────────────────────────────────────────────────
  dry-run:
    name: Dry-run (auto)
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download flopha binary
        uses: actions/download-artifact@v4
        with:
          name: flopha-linux
          path: /home/runner/.flopha/bin

      - name: Make binary executable
        run: chmod +x /home/runner/.flopha/bin/flopha

      - name: Add flopha binary to PATH
        run: echo "/home/runner/.flopha/bin" >> "$GITHUB_PATH"

      - name: Run flopha (dry-run)
        id: flopha
        uses: ./
        with:
          auto: true
          dry-run: true

      - name: Assert outputs
        shell: bash
        run: |
          TAG="${{ steps.flopha.outputs.tag }}"
          VER="${{ steps.flopha.outputs.version }}"
          echo "tag=$TAG  version=$VER"

          [[ -n "$TAG" ]] || { echo "::error::tag output is empty"; exit 1; }
          [[ -n "$VER" ]] || { echo "::error::version output is empty"; exit 1; }

          [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+ ]] || {
            echo "::error::tag '$TAG' does not match expected semver pattern"
            exit 1
          }
          [[ "$VER" =~ ^[0-9]+\.[0-9]+\.[0-9]+ ]] || {
            echo "::error::version '$VER' is not bare semver"
            exit 1
          }

  # ── manual increment dry-run ───────────────────────────────────────────────
  dry-run-increment:
    name: Dry-run (manual minor bump)
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download flopha binary
        uses: actions/download-artifact@v4
        with:
          name: flopha-linux
          path: /home/runner/.flopha/bin

      - name: Make binary executable
        run: chmod +x /home/runner/.flopha/bin/flopha

      - name: Add flopha binary to PATH
        run: echo "/home/runner/.flopha/bin" >> "$GITHUB_PATH"

      - name: Run flopha with manual minor bump (dry-run)
        id: flopha
        uses: ./
        with:
          auto: false
          increment: minor
          dry-run: true

      - name: Assert minor bump (patch must be 0)
        shell: bash
        run: |
          TAG="${{ steps.flopha.outputs.tag }}"
          echo "tag=$TAG"
          [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.0$ ]] || {
            echo "::error::tag '$TAG' should end in .0 (minor bump resets patch)"
            exit 1
          }

  # ── pre-release dry-run ────────────────────────────────────────────────────
  dry-run-pre:
    name: Dry-run (pre-release)
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download flopha binary
        uses: actions/download-artifact@v4
        with:
          name: flopha-linux
          path: /home/runner/.flopha/bin

      - name: Make binary executable
        run: chmod +x /home/runner/.flopha/bin/flopha

      - name: Add flopha binary to PATH
        run: echo "/home/runner/.flopha/bin" >> "$GITHUB_PATH"

      - name: Run flopha pre-release (dry-run)
        id: flopha
        uses: ./
        with:
          auto: true
          pre: rc
          dry-run: true

      - name: Assert pre-release suffix
        shell: bash
        run: |
          TAG="${{ steps.flopha.outputs.tag }}"
          echo "tag=$TAG"
          [[ "$TAG" =~ -rc\.[0-9]+$ ]] || {
            echo "::error::tag '$TAG' does not have -rc.<n> suffix"
            exit 1
          }

  # ── custom pattern dry-run ────────────────────────────────────────────────
  dry-run-pattern:
    name: Dry-run (custom major/minor pattern)
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download flopha binary
        uses: actions/download-artifact@v4
        with:
          name: flopha-linux
          path: /home/runner/.flopha/bin

      - name: Make binary executable
        run: chmod +x /home/runner/.flopha/bin/flopha

      - name: Add flopha binary to PATH
        run: echo "/home/runner/.flopha/bin" >> "$GITHUB_PATH"

      - name: Run flopha with custom patterns (dry-run)
        id: flopha
        uses: ./
        with:
          major-pattern: 'BREAKING CHANGE'
          minor-pattern: '^feat'
          dry-run: true

      - name: Assert outputs
        shell: bash
        run: |
          TAG="${{ steps.flopha.outputs.tag }}"
          VER="${{ steps.flopha.outputs.version }}"
          echo "tag=$TAG  version=$VER"
          [[ -n "$TAG" ]] || { echo "::error::tag output is empty"; exit 1; }
          [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+ ]] || {
            echo "::error::tag '$TAG' does not match expected semver pattern"
            exit 1
          }

  # ── custom rule dry-run ───────────────────────────────────────────────────
  dry-run-rule:
    name: Dry-run (custom rule input)
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download flopha binary
        uses: actions/download-artifact@v4
        with:
          name: flopha-linux
          path: /home/runner/.flopha/bin

      - name: Make binary executable
        run: chmod +x /home/runner/.flopha/bin/flopha

      - name: Add flopha binary to PATH
        run: echo "/home/runner/.flopha/bin" >> "$GITHUB_PATH"

      - name: Run flopha with custom rule (dry-run)
        id: flopha
        uses: ./
        with:
          rule: |
            major:BREAKING CHANGE
            minor:^feat
          dry-run: true

      - name: Assert outputs
        shell: bash
        run: |
          TAG="${{ steps.flopha.outputs.tag }}"
          echo "tag=$TAG"
          [[ -n "$TAG" ]] || { echo "::error::tag output is empty"; exit 1; }
          [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+ ]] || {
            echo "::error::tag '$TAG' does not match expected semver pattern"
            exit 1
          }

  # ── install script ─────────────────────────────────────────────────────────
  install:
    name: Install (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Run install script
        shell: bash
        env:
          FLOPHA_VERSION: latest
        run: bash action/install.sh

      - name: Verify binary
        shell: bash
        run: |
          flopha --version
          flopha --help

  # ── pinned version install ─────────────────────────────────────────────────
  install-pinned:
    name: Install (pinned version)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Run install script with pinned version
        shell: bash
        env:
          FLOPHA_VERSION: v0.2.0  # last release without --auto/--pre/--rule; tests install path only
        run: bash action/install.sh

      - name: Verify binary version
        shell: bash
        run: flopha --version
