name: Tag action release

on:
  release:
    types: [published]

jobs:
  tag:
    name: Update floating v1 tag
    runs-on: ubuntu-latest
    # Skip pre-releases — only stable releases should move the floating tag.
    # When the action has a breaking input/output change, rename this to v2
    # and update all references in action.yml and README accordingly.
    if: ${{ !github.event.release.prerelease }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Move v1 to this release
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git tag -f v1
          git push origin v1 --force
