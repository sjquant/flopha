name: 'flopha'
description: >
  Auto-tag the next version based on conventional commits.
  Requires `permissions: contents: write` in the calling workflow.
branding:
  icon: 'tag'
  color: 'blue'

inputs:
  auto:
    description: >
      Detect bump level from conventional commits
      (feat→minor, feat!/BREAKING CHANGE→major, else patch).
    required: false
    default: 'true'
  increment:
    description: 'Version part to bump when auto is false: major, minor, or patch.'
    required: false
    default: 'patch'
  pattern:
    description: "Version tag pattern, e.g. 'v{major}.{minor}.{patch}'."
    required: false
    default: 'v{major}.{minor}.{patch}'
  pre:
    description: 'Pre-release channel name, e.g. alpha, beta, rc.'
    required: false
    default: ''
  rule:
    description: >
      Custom bump rules, one per line, as 'level:regex'.
      Replaces the built-in conventional-commit defaults when provided.
      Example: "major:BREAKING CHANGE\nminor:^feat"
    required: false
    default: ''
  dry-run:
    description: 'Print the next tag without creating or pushing it.'
    required: false
    default: 'false'
  version:
    description: 'flopha release to install, e.g. v0.2.0. Defaults to latest.'
    required: false
    default: 'latest'
  github-token:
    description: 'Token used to push the version tag.'
    required: false
    default: ${{ github.token }}

outputs:
  tag:
    description: 'The next version tag (created and pushed unless dry-run is true).'
    value: ${{ steps.tag.outputs.tag }}

runs:
  using: 'composite'
  steps:
    - name: Install flopha
      shell: bash
      env:
        FLOPHA_VERSION: ${{ inputs.version }}
      run: |
        set -euo pipefail
        OS=$(uname -s)
        ARCH=$(uname -m)
        case "$OS/$ARCH" in
          Linux/x86_64)  TARGET="x86_64-unknown-linux-musl" ;;
          Darwin/x86_64) TARGET="x86_64-apple-darwin" ;;
          Darwin/arm64)  TARGET="aarch64-apple-darwin" ;;
          *)
            echo "::error::flopha: unsupported platform $OS/$ARCH (supported: Linux/x86_64, Darwin/x86_64, Darwin/arm64 — Windows runners are not supported)"
            exit 1
            ;;
        esac
        if [ "$FLOPHA_VERSION" = "latest" ]; then
          URL="https://github.com/sjquant/flopha/releases/latest/download/flopha-${TARGET}.tar.gz"
        else
          URL="https://github.com/sjquant/flopha/releases/download/${FLOPHA_VERSION}/flopha-${TARGET}.tar.gz"
        fi
        curl -sfL "$URL" | tar -xz -C /usr/local/bin

    - name: Fetch full history and tags
      shell: bash
      run: |
        git fetch --unshallow 2>/dev/null || true
        git fetch --tags --force

    - name: Create and push version tag
      id: tag
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
        INPUT_AUTO: ${{ inputs.auto }}
        INPUT_INCREMENT: ${{ inputs.increment }}
        INPUT_PATTERN: ${{ inputs.pattern }}
        INPUT_PRE: ${{ inputs.pre }}
        INPUT_RULE: ${{ inputs.rule }}
        INPUT_DRY_RUN: ${{ inputs.dry-run }}
      run: |
        set -euo pipefail

        git config --local user.name "github-actions[bot]"
        git config --local user.email "github-actions[bot]@users.noreply.github.com"

        ARGS=()
        if [ "$INPUT_AUTO" = "true" ]; then
          ARGS+=(--auto)
        else
          ARGS+=(--increment "$INPUT_INCREMENT")
        fi
        ARGS+=(--pattern "$INPUT_PATTERN")
        [ -n "$INPUT_PRE" ] && ARGS+=(--pre "$INPUT_PRE")
        while IFS= read -r rule; do
          [ -n "$rule" ] && ARGS+=(--rule "$rule")
        done <<< "$INPUT_RULE"

        if [ "$INPUT_DRY_RUN" = "true" ]; then
          NEW_TAG=$(flopha next-version "${ARGS[@]}")
          echo "tag=$NEW_TAG" >> "$GITHUB_OUTPUT"
          echo "Dry run — next tag would be: $NEW_TAG"
        else
          NEW_TAG=$(flopha next-version "${ARGS[@]}" --create)
          if ! git push origin "$NEW_TAG" 2>&1; then
            echo "::error::Failed to push tag $NEW_TAG. Make sure the workflow has 'permissions: contents: write'."
            exit 1
          fi
          echo "tag=$NEW_TAG" >> "$GITHUB_OUTPUT"
          echo "Created and pushed tag: $NEW_TAG"
        fi
